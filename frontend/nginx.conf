# ─────────────────────────────────────────────────────────────────────────────
# frontend/nginx.conf
#
# Nginx configuration for the React SPA served inside Docker.
#
# Two responsibilities:
#   1. Serve the static Vite build from /usr/share/nginx/html.
#      All unknown paths fall back to index.html so React Router handles them.
#   2. Proxy /api/* requests to the backend container so the browser never
#      needs to know the backend's hostname or port.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # ── Static assets ─────────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Aggressive caching for hashed asset files (JS/CSS bundles)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    # Forwards /api/* to the backend service.
    # "backend" resolves via Docker Compose's internal DNS.
    location /api/ {
        proxy_pass         http://backend:5001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── SPA fallback ──────────────────────────────────────────────────────────
    # Any path that doesn't match a real file is served as index.html
    # so React Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml;
}
