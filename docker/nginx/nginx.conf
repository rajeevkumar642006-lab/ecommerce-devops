# ─────────────────────────────────────────────────────────────────────────────
# docker/nginx/nginx.conf
#
# Optional standalone Nginx reverse proxy for production deployments where
# you want a dedicated proxy container in front of both services.
#
# In the default docker-compose.yml the frontend container already handles
# /api proxying internally, so this file is only needed if you add a
# separate nginx service to docker-compose.prod.yml.
# ─────────────────────────────────────────────────────────────────────────────

upstream frontend_upstream {
    server frontend:80;
}

upstream backend_upstream {
    server backend:5001;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # ── API traffic → backend ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Everything else → frontend ────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff"    always;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
}
